output:
  - skips
  - failure
  - summary

pre-commit:
  parallel: true
  commands:
    format-fix:
      glob: "src/**/*.{ts,tsx,css,scss,md,json,astro,html,js,jsx}"
      stage_fixed: true
      run: bun format:fix

pre-push:
  parallel: true
  commands:
    format-check:
      glob: "src/**/*.{ts,tsx,css,scss,md,json,astro,html,js,jsx}"
      run: bun format:check

    lint:
      glob: "src/**/*.{ts,tsx,astro,js,jsx}"
      run: bun lint
