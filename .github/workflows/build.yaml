name: Check and Build

on:
  pull_request:
    branches:
      - main

jobs:
  ci-check:
    name: web-build # This name is used in github rules
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          version: latest

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun format:check
      
      - name: Check linting
        run: bun lint

      - name: Build
        run: podman build -t delta-web .
